  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

x;margin-bottom:20px;\">\n        <div style=\"width:34px;height:34px;border-radius:8px;background:{{badge2Color}};color:#fff;font-weight:800;font-size:18px;display:flex;align-items:center;justify-content:center;\">2<\u002Fdiv>\n        <div data-edit=\"1\" contenteditable=\"true\" suppresscontenteditablewarning=\"true\" onblur=\"{{S.s2Title}}\" style=\"font-weight:700;color:#16305c;font-size:19px;\">{{T.s2Title}}<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:flex;flex-wrap:wrap;gap:16px;justify-content:center;margin-bottom:18px;\">\n        <sc-for list=\"{{s2List}}\" as=\"item\" hint-placeholder-count=\"4\">\n          <div data-card=\"1\" style=\"position:relative;display:flex;flex-direction:column;align-items:center;width:100px;\">\n            <button data-remove=\"1\" onclick=\"{{item.onRemove}}\" title=\"ลบ\" style=\"position:absolute;top:-6px;right:2px;width:20px;height:20px;border-radius:50%;background:#b1293a;color:#fff;border:2px solid #fff;font-size:12px;line-height:1;cursor:pointer;\">×<\u002Fbutton>\n            <image-slot id=\"{{item.slotId}}\" shape=\"circle\" style=\"width:{{sectionPersonSize}}px;height:{{sectionPersonSize}}px;\" placeholder=\"รูป\"><\u002Fimage-slot>\n            <div data-edit=\"1\" contenteditable=\"true\" suppresscontenteditablewarning=\"true\" onblur=\"{{item.onNameBlur}}\" style=\"margin-top:6px;font-weight:600;color:#16305c;font-size:12px;text-align:center;\">{{item.name}}<\u002Fdiv>\n            <div data-edit=\"1\" contenteditable=\"true\" suppresscontenteditablewarning=\"true\" onblur=\"{{item.onRoleBlur}}\" style=\"color:#5b6b85;font-size:11px;text-align:center;\">{{item.role}}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n        <div data-add-tile=\"1\" onclick=\"{{addS2Person}}\" title=\"เพิ่มคน\" style=\"display:flex;align-items:center;justify-content:center;width:82px;height:82px;border:2px dashed #94a3b8;border-radius:50%;color:#5b6b85;font-size:24px;cursor:pointer;\">+<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:10px;\">\n        <sc-for list=\"{{s2Photos}}\" as=\"item\" hint-placeholder-count=\"4\">\n          <div data-card=\"1\" style=\"position:relative;\">\n            <button data-remove=\"1\" onclick=\"{{item.onRemove}}\" title=\"ลบ\" style=\"position:absolute;top:4px;right:4px;width:22px;height:22px;border-radius:50%;background:#b1293a;color:#fff;border:2px solid #fff;font-size:13px;line-height:1;cursor:pointer;z-index:3;\">×<\u002Fbutton>\n            <image-slot id=\"{{item.slotId}}\" shape=\"rounded\" radius=\"6\" style=\"width:100%;height:{{sitePhotoHeight}}px;\" placeholder=\"ภาพหน้างาน\"><\u002Fimage-slot>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n        <div data-add-tile=\"1\" onclick=\"{{addS2Photo}}\" title=\"เพิ่มภาพ\" style=\"display:flex;align-items:center;justify-content:center;width:100%;height:{{sitePhotoHeight}}px;border:2px dashed #94a3b8;border-radius:6px;color:#5b6b85;font-size:26px;cursor:pointer;\">+<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fdiv>\n\n  <sc-if value=\"{{showQr}}\" hint-placeholder-val=\"{{false}}\">\n  <div style=\"margin:0 40px 30px;padding:24px 28px;background:#fdf7e3;border:2px dashed #16305c;border-radius:8px;display:flex;align-items:center;gap:24px;justify-content:center;\">\n    <image-slot id=\"qr-code\" shape=\"rect\" style=\"width:110px;height:110px;flex-shrink:0;\" placeholder=\"QR Code\"><\u002Fimage-slot>\n    <div style=\"color:#16305c;\">\n      <div data-edit=\"1\" contenteditable=\"true\" suppresscontenteditablewarning=\"true\" onblur=\"{{S.qrTitle}}\" style=\"font-weight:700;font-size:17px;margin-bottom:4px;\">{{T.qrTitle}}<\u002Fdiv>\n      <div data-edit=\"1\" contenteditable=\"true\" suppresscontenteditablewarning=\"true\" onblur=\"{{S.qrDesc}}\" style=\"font-size:14px;color:#5b6b85;\">{{T.qrDesc}}<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- FOOTER -->\n  <div style=\"text-align:center;padding:22px 20px 34px;color:#16305c;font-weight:700;font-size:16px;border-top:1px solid #eee;\">\n    จัดทำโดย : <span data-edit=\"1\" contenteditable=\"true\" suppresscontenteditablewarning=\"true\" onblur=\"{{S.footerOrg}}\" style=\"display:inline-block;\">{{T.footerOrg}}<\u002Fspan>\n  <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;theme&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;red-crimson&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;options&quot;: [&quot;blue-purple&quot;, &quot;green-gold&quot;, &quot;red-crimson&quot;], &quot;section&quot;: &quot;Theme&quot;},\n  &quot;twoColumns&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Layout&quot;},\n  &quot;showQr&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Layout&quot;},\n  &quot;photoSize&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;medium&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;options&quot;: [&quot;small&quot;, &quot;medium&quot;, &quot;large&quot;], &quot;section&quot;: &quot;Photo size&quot;},\n  &quot;showBackground&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: false, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Background&quot;}\n}\">\nconst CONTENT_STATE_FILE = '.infographic-content.state.json';\n\nconst DEFAULT_TEXT = {\n  title1: 'หัวข้อรายงาน / ชื่อกิจกรรมหลัก',\n  title2: 'รายละเอียดบรรทัดที่สอง เช่น วัน เวลา สถานที่จัดกิจกรรม',\n  desc: 'เนื้อหาสรุปรายละเอียดกิจกรรม — พิมพ์คำอธิบายเหตุการณ์ วัตถุประสงค์ หน่วยงานที่เกี่ยวข้อง และผลการดำเนินงานโดยสรุปตรงนี้ สามารถแก้ไขข้อความนี้ให้ตรงกับเนื้อหาจริงของแต่ละกิจกรรมได้ทันที',\n  s1Title: 'ชื่อหน่วยงาน / สถานที่แรก',\n  s2Title: 'ชื่อหน่วยงาน / สถานที่ที่สอง',\n  qrTitle: 'ช่องทางข้อเสนอแนะ',\n  qrDesc: 'สแกน QR Code เพื่อแสดงความคิดเห็นหรือข้อเสนอแนะเพิ่มเติม',\n  footerOrg: 'ชื่อหน่วยงานผู้จัดทำ'\n};\n\nfunction defaultLists() {\n  return {\n    lead: [\n      { id: 'lead-1', name: 'ชื่อ-นามสกุล ประธาน', role: 'ตำแหน่ง / หน่วยงาน' },\n      { id: 'lead-2', name: 'ชื่อ-นามสกุล', role: 'ตำแหน่ง' },\n      { id: 'lead-3', name: 'ชื่อ-นามสกุล', role: 'ตำแหน่ง' },\n      { id: 'lead-4', name: 'ชื่อ-นามสกุล', role: 'ตำแหน่ง' },\n      { id: 'lead-5', name: 'ชื่อ-นามสกุล', role: 'ตำแหน่ง' }\n    ],\n    row2: [\n      { id: 'row2-1', name: 'ชื่อ-นามสกุล', role: 'ตำแหน่ง' },\n      { id: 'row2-2', name: 'ชื่อ-นามสกุล', role: 'ตำแหน่ง' },\n      { id: 'row2-3', name: 'ชื่อ-นามสกุล', role: 'ตำแหน่ง' },\n      { id: 'row2-4', name: 'ชื่อ-นามสกุล', role: 'ตำแหน่ง' },\n      { id: 'row2-5', name: 'ชื่อ-นามสกุล', role: 'ตำแหน่ง' },\n      { id: 'row2-6', name: 'ชื่อ-นามสกุล', role: 'ตำแหน่ง' },\n      { id: 'row2-7', name: 'ชื่อ-นามสกุล', role: 'ตำแหน่ง' }\n    ],\n    s1: [\n      { id: 's1-p1', name: 'ชื่อ-นามสกุล', role: 'ตำแหน่ง' },\n      { id: 's1-p2', name: 'ชื่อ-นามสกุล', role: 'ตำแหน่ง' },\n      { id: 's1-p3', name: 'ชื่อ-นามสกุล', role: 'ตำแหน่ง' },\n      { id: 's1-p4', name: 'ชื่อ-นามสกุล', role: 'ตำแหน่ง' }\n    ],\n    s2: [\n      { id: 's2-p1', name: 'ชื่อ-นามสกุล', role: 'ตำแหน่ง' },\n      { id: 's2-p2', name: 'ชื่อ-นามสกุล', role: 'ตำแหน่ง' },\n      { id: 's2-p3', name: 'ชื่อ-นามสกุล', role: 'ตำแหน่ง' },\n      { id: 's2-p4', name: 'ชื่อ-นามสกุล', role: 'ตำแหน่ง' }\n    ],\n    s1photos: [\n      { id: 's1-photo1' }, { id: 's1-photo2' }, { id: 's1-photo3' }, { id: 's1-photo4' }\n    ],\n    s2photos: [\n      { id: 's2-photo1' }, { id: 's2-photo2' }, { id: 's2-photo3' }, { id: 's2-photo4' }\n    ],\n    logos: [\n      { id: 'logo-left' }, { id: 'logo-right' }\n    ]\n  };\n}\n\nfunction genId(prefix) {\n  return prefix + '-' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6);\n}\n\nclass Component extends DCLogic {\n  state = { text: {}, lists: defaultLists() };\n\n  componentDidMount() {\n    fetch(CONTENT_STATE_FILE)\n      .then((r) => (r.ok ? r.json() : null))\n      .then((j) => {\n        if (j && typeof j === 'object') {\n          this.setState({\n            text: j.text || {},\n            lists: (j.lists && Object.keys(j.lists).length) ? j.lists : defaultLists()\n          });\n        }\n      })\n      .catch(() => {});\n  }\n\n  persist(next) {\n    const w = window.omelette && window.omelette.writeFile;\n    if (!w) return;\n    try { Promise.resolve(w(CONTENT_STATE_FILE, JSON.stringify(next))).catch(() => {}); } catch (e) {}\n  }\n\n  commitText(id, value) {\n    this.setState((s) => {\n      const text = Object.assign({}, s.text, { [id]: value });\n      this.persist({ text: text, lists: s.lists });\n      return { text: text };\n    });\n  }\n\n  commitListField(listKey, itemId, field, value) {\n    this.setState((s) => {\n      const list = (s.lists[listKey] || []).map((it) => it.id === itemId ? Object.assign({}, it, { [field]: value }) : it);\n      const lists = Object.assign({}, s.lists, { [listKey]: list });\n      this.persist({ text: s.text, lists: lists });\n      return { lists: lists };\n    });\n  }\n\n  addItem(listKey, extra) {\n    this.setState((s) => {\n      const item = Object.assign({ id: genId(listKey) }, extra || {});\n      const list = (s.lists[listKey] || []).concat([item]);\n      const lists = Object.assign({}, s.lists, { [listKey]: list });\n      this.persist({ text: s.text, lists: lists });\n      return { lists: lists };\n    });\n  }\n\n  removeItem(listKey, itemId) {\n    this.setState((s) => {\n      const list = (s.lists[listKey] || []).filter((it) => it.id !== itemId);\n      const lists = Object.assign({}, s.lists, { [listKey]: list });\n      this.persist({ text: s.text, lists: lists });\n      return { lists: lists };\n    });\n  }\n\n  renderVals() {\n    const themes = {\n      'blue-purple': { badge1: '#4361c9', badge2: '#7c5cd1', border: '#c9a24a' },\n      'green-gold': { badge1: '#2f8f4e', badge2: '#c9a24a', border: '#2f8f4e' },\n      'red-crimson': { badge1: '#b1293a', badge2: '#7a1f2b', border: '#b1293a' }\n    };\n    const theme = this.props.theme ?? 'blue-purple';\n    const t = themes[theme] || themes['blue-purple'];\n    const twoColumns = this.props.twoColumns ?? true;\n\n    const sizes = {\n      small: { lead1: 110, leadOther: 85, row2: 68, sectionPerson: 62, sitePhoto: 84 },\n      medium: { lead1: 150, leadOther: 120, row2: 96, sectionPerson: 82, sitePhoto: 110 },\n      large: { lead1: 190, leadOther: 150, row2: 120, sectionPerson: 100, sitePhoto: 140 }\n    };\n    const sz = sizes[this.props.photoSize ?? 'medium'];\n\n    const text = this.state.text || {};\n    const T = {};\n    const S = {};\n    Object.keys(DEFAULT_TEXT).forEach((id) => {\n      const v = text[id];\n      T[id] = (v !== undefined && v !== '') ? v : DEFAULT_TEXT[id];\n      S[id] = (e) => this.commitText(id, e.target.innerText);\n    });\n\n    const lists = this.state.lists || defaultLists();\n\n    const mkPersonList = (key) => (lists[key] || []).map((p, i) => ({\n      id: p.id,\n      slotId: p.id,\n      name: p.name || 'ชื่อ-นามสกุล',\n      role: p.role || 'ตำแหน่ง',\n      size: key === 'lead' ? (i === 0 ? sz.lead1 : sz.leadOther) : (key === 'row2' ? sz.row2 : sz.sectionPerson),\n      border: (key === 'lead' && i === 0) ? '3px solid #16305c' : 'none',\n      boxWidth: key === 'lead' ? (i === 0 ? 180 : 150) : 150,\n      onNameBlur: (e) => this.commitListField(key, p.id, 'name', e.target.innerText),\n      onRoleBlur: (e) => this.commitListField(key, p.id, 'role', e.target.innerText),\n      onRemove: () => this.removeItem(key, p.id)\n    }));\n\n    const mkPhotoList = (key) => (lists[key] || []).map((p) => ({\n      id: p.id,\n      slotId: p.id,\n      onRemove: () => this.removeItem(key, p.id)\n    }));\n\n    return {\n      T: T,\n      S: S,\n\n      leadList: mkPersonList('lead'),\n      row2List: mkPersonList('row2'),\n      s1List: mkPersonList('s1'),\n      s2List: mkPersonList('s2'),\n      s1Photos: mkPhotoList('s1photos'),\n      s2Photos: mkPhotoList('s2photos'),\n      logoList: mkPhotoList('logos'),\n\n      addLeadItem: () => this.addItem('lead', { name: 'ชื่อ-นามสกุล', role: 'ตำแหน่ง' }),\n      addRow2Item: () => this.addItem('row2', { name: 'ชื่อ-นามสกุล', role: 'ตำแหน่ง' }),\n      addS1Person: () => this.addItem('s1', { name: 'ชื่อ-นามสกุล', role: 'ตำแหน่ง' }),\n      addS2Person: () => this.addItem('s2', { name: 'ชื่อ-นามสกุล', role: 'ตำแหน่ง' }),\n      addS1Photo: () => this.addItem('s1photos', {}),\n      addS2Photo: () => this.addItem('s2photos', {}),\n      addLogo: () => this.addItem('logos', {}),\n\n      badge1Color: t.badge1,\n      badge2Color: t.badge2,\n      boxBorderColor: t.border,\n      twoColumns: twoColumns,\n      gridCols: twoColumns ? '1fr 1fr' : '1fr',\n      showQr: this.props.showQr ?? false,\n\n      row2Size: sz.row2,\n      sectionPersonSize: sz.sectionPerson,\n      sitePhotoHeight: sz.sitePhoto,\n\n      showBackground: this.props.showBackground ?? false,\n\n      onExportImage: () => this.exportImage(),\n      onExportPptx: () => this.exportPptx(),\n      onCopyLink: () => this.copyLink(),\n      onNewActivity: () => this.newActivity()\n    };\n  }\n\n  async captureRootPng() {\n    const root = document.querySelector('[data-export-root]');\n    if (!root || !window.htmlToImage) return null;\n    const rect = root.getBoundingClientRect();\n    const dataUrl = await window.htmlToImage.toPng(root, {\n      pixelRatio: 2,\n      backgroundColor: '#ffffff',\n      filter: (node) => !(node.tagName === 'IMG' && !node.getAttribute('src'))\n    });\n    return { dataUrl: dataUrl, width: rect.width, height: rect.height };\n  }\n\n  async exportImage() {\n    try {\n      const cap = await this.captureRootPng();\n      if (!cap) { alert('ไม่สามารถสร้างภาพได้ในขณะนี้ ลองรีเฟรชหน้าแล้วลองใหม่'); return; }\n      const link = document.createElement('a');\n      link.download = 'infographic.png';\n      link.href = cap.dataUrl;\n      link.click();\n    } catch (e) {\n      alert('ดาวน์โหลดภาพไม่สำเร็จ: ' + (e && e.message ? e.message : 'unknown error'));\n    }\n  }\n\n  async exportPptx() {\n    try {\n      const cap = await this.captureRootPng();\n      if (!cap || !window.PptxGenJS) { alert('ไม่สามารถสร้างไฟล์ PPT ได้ในขณะนี้ ลองรีเฟรชหน้าแล้วลองใหม่'); return; }\n      const DPI = 96;\n      const wIn = cap.width / DPI;\n      const hIn = cap.height / DPI;\n      const pptx = new window.PptxGenJS();\n      pptx.defineLayout({ name: 'INFOGRAPHIC', width: wIn, height: hIn });\n      pptx.layout = 'INFOGRAPHIC';\n      const slide = pptx.addSlide();\n      slide.addImage({ data: cap.dataUrl, x: 0, y: 0, w: wIn, h: hIn });\n      await pptx.writeFile({ fileName: 'infographic.pptx' });\n    } catch (e) {\n      alert('ดาวน์โหลด PPT ไม่สำเร็จ: ' + (e && e.message ? e.message : 'unknown error'));\n    }\n  }\n\n  copyLink() {\n    const url = window.location.href;\n    if (navigator.clipboard && navigator.clipboard.writeText) {\n      navigator.clipboard.writeText(url).then(\n        () => alert('คัดลอกลิงก์แล้ว — วางเพื่อกลับมาแก้ไขหน้านี้ได้ทีหลัง'),\n        () => alert(url)\n      );\n    } else {\n      alert(url);\n    }\n  }\n\n  async newActivity() {\n    const ok = confirm('เริ่มกิจกรรมใหม่จะล้างรูปภาพและข้อความทั้งหมดในหน้านี้ ต้องการดำเนินการต่อหรือไม่?');\n    if (!ok) return;\n    const w = window.omelette && window.omelette.writeFile;\n    if (w) {\n      try { await Promise.resolve(w('.image-slots.state.json', '{}')); } catch (e) {}\n      try { await Promise.resolve(w(CONTENT_STATE_FILE, '{}')); } catch (e) {}\n    }\n    this.setState({ text: {}, lists: defaultLists() });\n    window.location.reload();\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
